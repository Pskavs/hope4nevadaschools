version: 2

exposures:

  # ── CCSD School Improvement Dashboard ─────────────────────────────────────
  - name: ccsd_school_improvement_dashboard
    label: "CCSD School Improvement Dashboard"
    type: dashboard
    maturity: medium
    description: >
      Power BI dashboard surfacing which CCSD schools are most consistently
      improving in ELA and Math proficiency, broken out by region and the
      Transformation Network. Built as a portfolio project by a former
      CCSD 3rd grade teacher turned analytics engineer.
    depends_on:
      - ref('fct_school_improvement')
      - ref('fct_school_improvement_yoy')
      - ref('dim_schools')
    owner:
      name: Christian Paskevicius
      email: pskavs@gmail.com
    tags: ['dashboard', 'power_bi', 'school_improvement']

  # ── Enrollment Trends Report ───────────────────────────────────────────────
  - name: enrollment_trends_report
    label: "Annual Enrollment Trends Report"
    type: ml
    maturity: medium
    description: >
      Python-based enrollment forecasting model that reads fct_enrollment_trends
      to project future year headcounts by school, grade band, and region.
      Used for facilities planning and budget allocation.
    depends_on:
      - ref('fct_enrollment_trends')
      - ref('dim_schools')
    owner:
      name: Research & Accountability Office
      email: research@ccsd.net
    tags: ['forecast', 'enrollment', 'facilities']

  # ── Nevada Report Card Export ──────────────────────────────────────────────
  - name: nevada_report_card_extract
    label: "Nevada Report Card Data Extract"
    type: application
    maturity: high
    description: >
      Nightly CSV extract sent to the Nevada Department of Education for
      publication on the Nevada Report Card portal.
      Derived from fct_school_performance filtered to SBAC subjects only.
    depends_on:
      - ref('fct_school_performance')
    owner:
      name: Data Governance Team
      email: data-governance@ccsd.net
    tags: ['state_reporting', 'nevada_doe', 'extract']