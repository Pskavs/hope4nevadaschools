version: 2

models:

  - name: stg_enrollment
    description: Cleaned enrollment counts by school and year.
    columns:
      - name: school_id
        tests: [not_null]
      - name: school_year
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 2015
                max_value: 2030
      - name: total_enrolled
        tests: [not_null]

  - name: stg_attendance
    description: Chronic absenteeism rates per school and year.
    columns:
      - name: school_id
        tests: [not_null]
      - name: school_year
        tests: [not_null]
      - name: chronic_absenteeism_rate
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
      - name: absenteeism_tier
        tests:
          - accepted_values:
              arguments:
                values: ['Low','Moderate','High','Critical']

  - name: stg_assessment_scores
    description: CRT assessment proficiency rates by school and year.
    columns:
      - name: school_id
        tests: [not_null]
      - name: school_year
        tests: [not_null]
      - name: math_pct_proficient
      - name: ela_pct_proficient
      - name: math_suppressed
        tests: [not_null]
      - name: ela_suppressed
        tests: [not_null]